<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malbourne Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons (optional but helpful) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-page">
    <!-- Login Section (initially visible) -->
    <div class="login-section" id="loginSection">
        <div class="login-card">
            <h1 class="login-title">MALBOURNE ADMIN</h1>
            
            <form id="adminLoginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="admin@malbourne.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary btn-login">
                    <span>Login</span>
                </button>
            </form>
            
            <p class="login-hint">Demo: admin@malbourne.com / admin123</p>
        </div>
    </div>

    <!-- Dashboard Section (hidden by default) -->
    <div class="dashboard-section" id="dashboardSection" style="display: none;">
        <!-- Navbar -->
        <nav class="navbar" id="navbar">
            <div class="nav-brand">
                <span class="brand-text">MALBOURNE ADMIN</span>
            </div>
            <div class="nav-user">
                <span class="user-email" id="userEmailDisplay">admin@malbourne.com</span>
                <button class="btn-logout" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </nav>

        <!-- Main Dashboard Container -->
        <div class="dashboard-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-menu">
                    <button class="menu-item active" data-category="story">
                        <span class="menu-icon">📸</span>
                        <span class="menu-text">Story</span>
                    </button>
                    
                    <button class="menu-item" data-category="experience">
                        <span class="menu-icon">🎥</span>
                        <span class="menu-text">Experience</span>
                    </button>
                    
                    <button class="menu-item" data-category="retail">
                        <span class="menu-icon">🛍</span>
                        <span class="menu-text">Retail</span>
                    </button>
                    
                    <button class="menu-item" data-category="training">
                        <span class="menu-icon">🎓</span>
                        <span class="menu-text">Training</span>
                    </button>
                </div>
                
                <div class="sidebar-footer">
                    <div class="storage-info">
                        <div class="storage-label">
                            <small>Storage</small>
                            <small class="storage-used">245 MB / 1 GB</small>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 24%"></div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content" id="mainContent">
                <!-- Content will be dynamically loaded here -->
            </main>
        </div>
    </div>

    <!-- Upload Modal (hidden by default) -->
    <div class="modal" id="uploadModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Upload New Media</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="uploadForm" class="upload-form">
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="uploadCategory" class="category-input" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>Media Type</label>
                        <div class="media-type-selector">
                            <label class="radio-label">
                                <input type="radio" name="mediaType" value="image" checked>
                                <span class="radio-custom">Image</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="mediaType" value="video">
                                <span class="radio-custom">Video</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Choose File</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="fileInput" accept="image/*,video/*" required>
                            <div class="file-input-placeholder">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>Click or drag file to upload</span>
                                <small id="fileNameDisplay">No file selected</small>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary btn-upload">
                        <i class="fas fa-upload"></i>
                        <span>Upload Media</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal modal-small" id="deleteModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Confirm Delete</h3>
                <button class="modal-close" id="closeDeleteModal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this media?</p>
                <p class="delete-filename" id="deleteFileName"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button class="btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
